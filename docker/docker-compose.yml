services:
    mysqldb:
        image: mysql:8.0
        restart: unless-stopped
        environment:
          - MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
          - MYSQL_DATABASE=$MYSQL_DATABASE
        ports:
          - ${MYSQL_PORT:-3307}:3306
        volumes:
          - db:/var/lib/mysql
        healthcheck:
            test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -u root --silent"]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s
    jetmon:
        hostname: docker.jetmon.dev.com
        build:
          context: ../
          dockerfile: docker/Dockerfile_jetmon
        restart: unless-stopped
        user: "${UID:-1000}:${GID:-1000}"
        volumes:
          - ../config:/jetmon/config
          - ../logs:/jetmon/logs
          - ../stats:/jetmon/stats
        environment:
          - DB_HOST=mysqldb
          - DB_USER=$MYSQL_USER
          - DB_PASSWORD=$MYSQL_ROOT_PASSWORD
          - DB_NAME=$MYSQL_DATABASE
          - DB_PORT=3306
          - VERIFLIER_AUTH_TOKEN=$VERIFLIER_AUTH_TOKEN
          - VERIFLIER_PORT=7803
          - WPCOM_AUTH_TOKEN=$WPCOM_AUTH_TOKEN
          - JETMON_PID_FILE=/jetmon/stats/jetmon2.pid
        ports:
          - ${DASHBOARD_PORT:-8080}:8080
          - ${API_PORT:-8090}:8090
        depends_on:
            mysqldb:
                condition: service_healthy
    veriflier:
        build:
          context: ../
          dockerfile: docker/Dockerfile_veriflier
        restart: unless-stopped
        volumes:
          - ../veriflier2/config:/opt/veriflier/config
        ports:
          - ${VERIFLIER_PORT:-7803}:7803
        environment:
          - VERIFLIER_AUTH_TOKEN=$VERIFLIER_AUTH_TOKEN
          - VERIFLIER_PORT=7803
          - STATSD_ADDR=statsd:8125
    statsd:
        image: graphiteapp/graphite-statsd
        restart: unless-stopped
        ports:
          - 8088:80
          - 8125:8125
          - 8125:8125/udp
        volumes:
          - ./volumes/statsd/graphite/conf:/opt/graphite/conf
          - ./volumes/statsd/graphite/storage:/opt/graphite/storage
          - ./volumes/statsd/statsd/config:/opt/statsd/config
          - ./volumes/statsd/logs:/var/log

volumes:
  db:
